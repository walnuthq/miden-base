name: Publish workspace to crates.io

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC token exchange

jobs:
  publish:
    if: ${{ github.repository_owner == '0xMiden' }}
    runs-on: ubuntu-latest
    environment: release  # Optional: for enhanced security

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.target_commitish }}

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@63a7064947ceca9989005e118db3a5fecdc9259f # v1.0.0
        id: auth

      - name: Publish workspace crates
        uses: ./.github/actions/workspace-release
        with:
          mode: "publish"
          verify-branch-head: "true"
          release-branch: ${{ github.event.release.target_commitish }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
